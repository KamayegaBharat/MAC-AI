<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac AI | Intelligence Redefined</title>
    <style>
        :root {
            --mac-bg: #000000;
            --mac-card: #1c1c1e;
            --mac-accent: #0a84ff;
            --mac-text: #ffffff;
            --mac-secondary: #8e8e93;
            --mac-border: #3a3a3c;
            --mac-green: #32d74b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--mac-bg);
            color: var(--mac-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .window {
            background: var(--mac-card);
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            border: 1px solid var(--mac-border);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        h1 { font-size: 34px; font-weight: 700; text-align: center; margin-bottom: 5px; letter-spacing: -1px; }
        p.subtitle { text-align: center; color: var(--mac-secondary); margin-bottom: 35px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        .input-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; font-size: 11px; color: var(--mac-secondary); font-weight: 700; padding-left: 5px; }
        
        select, textarea {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid var(--mac-border);
            color: white;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        textarea { height: 120px; resize: none; line-height: 1.5; }
        textarea:focus, select:focus { border-color: var(--mac-accent); outline: none; background: #3a3a3c; }
        
        button {
            width: 100%;
            background-color: var(--mac-accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        button:hover { background-color: #409fff; box-shadow: 0 0 15px rgba(10, 132, 255, 0.4); }
        button:disabled { background-color: #48484a; opacity: 0.6; cursor: not-allowed; }

        #response-container {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.6;
            min-height: 60px;
            color: #f5f5f7;
            border: 1px solid var(--mac-border);
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .status-dot { height: 8px; width: 8px; background-color: var(--mac-green); border-radius: 50%; display: inline-block; margin-right: 5px; }
        .loader { color: var(--mac-accent); font-weight: 500; display: block; text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="window">
    <h1>Mac AI</h1>
    <p class="subtitle"><span class="status-dot"></span> System Online</p>

    <div class="input-group">
        <label>MODEL ARCHITECTURE</label>
        <select id="modelSelect">
            <option value="google/gemma-3-27b:free">Gemma 3 27B (Newest & Best)</option>
            <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (High Intelligence)</option>
            <option value="qwen/qwen-3-480b-instruct:free">Qwen 3 (Deep Logic)</option>
            <option value="mistralai/mistral-small-24b-instruct-2501:free">Mistral Small (Fast Coding)</option>
            <option value="openrouter/auto">Auto-Select (Dynamic)</option>
        </select>
    </div>

    <div class="input-group">
        <label>PROMPT INPUT</label>
        <textarea id="userInput" placeholder="Ask Mac AI anything..."></textarea>
    </div>

    <button id="askBtn" onclick="runMacAI()">Execute Engine</button>

    <div id="response-container">
        <div id="output">Ready for input.</div>
    </div>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycby_s7sh8RrD9aT60MtyMeSUN0wnOg126uoJ3AT4osJ1wYmFUIp5n17kGC-WvkQk7KU/exec";

    async function runMacAI() {
        const prompt = document.getElementById('userInput').value.trim();
        const model = document.getElementById('modelSelect').value;
        const output = document.getElementById('output');
        const btn = document.getElementById('askBtn');

        if (!prompt) return;

        output.innerHTML = '<span class="loader">Processing Neural Request...</span>';
        btn.disabled = true;

        try {
            // Using the GET method you established to bypass CORS
            const params = new URLSearchParams({ data: JSON.stringify({ prompt, model }) });
            const response = await fetch(`${APP_URL}?${params.toString()}`);

            if (!response.ok) throw new Error("Connection Refused");

            const result = await response.json();

            if (result.choices && result.choices[0]) {
                output.innerText = result.choices[0].message.content;
            } else if (result.error) {
                output.innerText = "System Error: " + (result.error.message || "Model Unavailable");
            } else {
                output.innerText = "Error: Logic Gateway timed out.";
            }

        } catch (err) {
            output.innerText = "❌ Network Error: Verify Google Script Deployment.";
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
